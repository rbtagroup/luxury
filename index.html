  <header>
    <h1><img src="icon-192.png" width="30" height="30" alt="RB TAXI" class="brand-icon" /> <span class="brand-title">RB TAXI · Výčetka řidiče</span></h1>
    <button type="button" id="themeToggle" aria-label="Přepnout barevný režim"><span class="ico" aria-hidden="true">🌙</span> Režim: tmavý</button>
  </header>
  <main>
    <form id="calcForm" autocomplete="off">
      <fieldset>
        <legend>Směna</legend>
        <label><span class="field-title"><span class="ico" aria-hidden="true">👤</span><span>Řidič:</span></span><input type="text" id="driverName" name="driverName" placeholder="Jméno řidiče…" autocomplete="name" required /></label>
        <label><span class="field-title"><span class="ico" aria-hidden="true">⏱️</span><span>Typ směny:</span></span>
          <select id="shiftType" name="shiftType">
            <option value="den">Denní</option>
            <option value="noc">Noční</option>
            <option value="odpo">Odpolední</option>
            <option value="pul">1/2 směna</option>
          </select>
        </label>
        <label><span class="field-title"><span class="ico" aria-hidden="true">🚕</span><span>RZ vozidla:</span></span>
          <select id="rz" name="rz" required>
            <option value="">— vyberte RZ —</option>
            <option>1BU0299</option>
            <option>1BU0060</option>
            <option>2BT6881</option>
            <option>2BT1565</option>
            <option>2BY5398</option>
            <option>2BL8995</option>
            <option>3BD6003</option>
          </select>
        </label>
      </fieldset>

      <fieldset>
        <legend>Kilometry</legend>
        <label><span class="field-title"><span class="ico" aria-hidden="true">🏁</span><span>Počáteční km:</span></span>
          <input type="number" id="kmStart" name="kmStart" inputmode="numeric" min="0" step="1" required />
        </label>
        <label><span class="field-title"><span class="ico" aria-hidden="true">🏁</span><span>Konečné km:</span></span>
          <input type="number" id="kmEnd" name="kmEnd" inputmode="numeric" min="0" step="1" required />
        </label>
        <label><span class="field-title"><span class="ico" aria-hidden="true">🛣️</span><span>Najeté km:</span></span>
          <input type="number" id="kmReal" name="kmReal" readonly tabindex="-1" />
        </label>
      </fieldset>

      <fieldset>
        <legend>Platby a odpočty</legend>
        <label><span class="field-title"><span class="ico" aria-hidden="true">💰</span><span>Tržba:</span></span><input type="number" id="trzba" name="trzba" inputmode="decimal" min="0" step="0.01" required /></label>
        <label><span class="field-title"><span class="ico" aria-hidden="true">🏁</span><span>Přístavné:</span></span><input type="number" id="pristavne" name="pristavne" inputmode="decimal" min="0" step="0.01" /></label>
        <label><span class="field-title"><span class="ico" aria-hidden="true">⛽</span><span>Palivo:</span></span><input type="number" id="palivo" name="palivo" inputmode="decimal" min="0" step="0.01" /></label>
        <label><span class="field-title"><span class="ico" aria-hidden="true">🧼</span><span>Mytí:</span></span><input type="number" id="myti" name="myti" inputmode="decimal" min="0" step="0.01" /></label>
        <label><span class="field-title"><span class="ico" aria-hidden="true">💳</span><span>Kartou:</span></span><input type="number" id="kartou" name="kartou" inputmode="decimal" min="0" step="0.01" /></label>
        <label><span class="field-title"><span class="ico" aria-hidden="true">🧾</span><span>Fakturou:</span></span><input type="number" id="fakturou" name="fakturou" inputmode="decimal" min="0" step="0.01" /></label>
        <label><span class="field-title"><span class="ico" aria-hidden="true">🧾</span><span>Jiné:</span></span><input type="number" id="jine" name="jine" inputmode="decimal" min="0" step="0.01" /></label>
      </fieldset>

      <div class="form-actions">
        <button type="submit"><span class="ico">🧮</span> Vypočítat</button>
        <button type="button" id="resetBtn" class="secondary"><span class="ico">🔄</span> Reset</button>
        
      </div>
    </form>

    <section id="output" class="hidden" aria-live="polite"></section>
    <div id="actions" class="hidden">
      <button type="button" id="newShiftBtn" class="secondary"><span class="ico">🔁</span> Nová směna</button>
      <button type="button" id="shareBtn"><span class="ico">📋</span> Sdílet text</button>
      <button type="button" id="shareImgBtn" title="Sdílet výčetku"><span class="ico">📸</span> Sdílet obrázek</button>
